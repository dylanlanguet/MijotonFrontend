{% extends 'recipes/base.html' %}

{% block title %}Supprimer la Recette - Mijotons{% endblock %}

{% block content %}
<h2>Supprimer la Recette</h2>

<div class="card">
    <p>Êtes-vous sûr de vouloir supprimer la recette "<strong>{{ recette.titre }}</strong>" ?</p>
    <p>Cette action est irréversible.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Oui, supprimer</button>
        <a href="{% url 'detail_recette' recette.pk %}" class="btn">Annuler</a>
    </form>
</div>
{% endblock %}
