{% extends 'recipes/base.html' %}

{% block title %}Ajouter une Recette - Mijotons{% endblock %}

{% block content %}
<h2>Ajouter une Recette</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <label for="titre">Titre</label>
    <input type="text" id="titre" name="titre" required>
    
    <label for="categorie">Catégorie</label>
    <select id="categorie" name="categorie" required>
        {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.nom }}</option>
        {% endfor %}
    </select>
    
    <label for="temps_preparation">Temps de préparation (minutes)</label>
    <input type="number" id="temps_preparation" name="temps_preparation" required>
    
    <label for="portions">Portions</label>
    <input type="number" id="portions" name="portions" required>
    
    <label for="difficulte">Difficulté</label>
    <select id="difficulte" name="difficulte" required>
        <option value="facile">Facile</option>
        <option value="moyen">Moyen</option>
        <option value="difficile">Difficile</option>
    </select>
    
    <label for="ingredients">Ingrédients</label>
    <textarea id="ingredients" name="ingredients" rows="5" required></textarea>
    
    <label for="etapes">Étapes</label>
    <textarea id="etapes" name="etapes" rows="5" required></textarea>
    
    <label for="ustensiles">Ustensiles</label>
    <textarea id="ustensiles" name="ustensiles" rows="3"></textarea>
    
    <label for="image">Image</label>
    <input type="file" id="image" name="image" accept="image/*">
    
    <button type="submit" class="btn">Ajouter la recette</button>
</form>
{% endblock %}
